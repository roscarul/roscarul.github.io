<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Unity Projects</title>
  <link rel="stylesheet" href="../style.css">

  <style>
    .project-subtitle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .tech-pills { display: flex; flex-wrap: wrap; gap: 8px; }

    .tech-pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--bg);
      border: 1px solid var(--border-accent);
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
    }

    .overview-block p {
      color: var(--text);
      font-size: 1.02rem;
      line-height: 1.85;
      margin-bottom: 1.1em;
      border-left: 2px solid var(--border-accent);
      padding-left: 18px;
    }

    .highlight-word { color: var(--accent); font-weight: 600; }

    .role-badges { display: flex; flex-wrap: wrap; gap: 8px; }

    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--accent-dim);
      border: 1px solid var(--border-accent);
      border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      color: var(--accent);
    }

    .challenge-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .challenge-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .challenge-card-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .challenge-card-desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
  </style>
</head>

<body>

<header>
  <h1>Unity Projects</h1>

  <p class="subtitle"
    data-es="Game Programmer · Sound Designer"
    data-en="Game Programmer · Sound Designer">
  </p>

  <a href="../index.html" class="btn btn-primary back-button"
    data-es="← Volver a inicio"
    data-en="← Back to home">
  </a>

  <div class="lang-switch">
    <button onclick="setLang('es')" class="btn">ES</button>
    <button onclick="setLang('en')" class="btn">EN</button>
  </div>
</header>

<!-- TECH STACK -->
<section>
  <p class="project-subtitle" data-es="Stack tecnológico" data-en="Tech stack"></p>
  <div class="tech-pills">
    <span class="tech-pill">Unity</span>
    <span class="tech-pill">C#</span>
    <span class="tech-pill">Game Jams</span>
    <span class="tech-pill">Rapid Prototyping</span>
    <span class="tech-pill">Gameplay Design</span>
    <span class="tech-pill">Audio Design</span>
  </div>
</section>

<!-- OVERVIEW -->
<section>
  <h2 data-es="Descripción" data-en="Overview"></h2>
  <div class="overview-block">
    <p
      data-es="Esta página recoge una colección de proyectos desarrollados durante distintas <span class='highlight-word'>game jams</span>, donde el objetivo principal era crear experiencias jugables completas en un tiempo muy limitado."
      data-en="This page showcases a collection of projects developed during different <span class='highlight-word'>game jams</span>, where the main goal was to build complete playable experiences within a very limited timeframe.">
    </p>

    <p
      data-es="Estos entornos de desarrollo rápido exigían tomar decisiones constantes bajo presión, priorizar correctamente y adaptar el diseño a restricciones cambiantes, lo que reforzó habilidades clave como el <span class='highlight-word'>prototipado rápido</span> y la iteración continua."
      data-en="These fast-paced environments required constant decision-making under pressure, proper prioritization, and adapting design to changing constraints, strengthening key skills such as <span class='highlight-word'>rapid prototyping</span> and continuous iteration.">
    </p>
  </div>
</section>

<!-- ROLE -->
<section>
  <h2 data-es="Rol" data-en="Role"></h2>
  <div class="role-badges">
    <span class="role-badge">Game Programmer</span>
    <span class="role-badge">Sound Designer</span>
    <span class="role-badge">Game Designer</span>
    <span class="role-badge">Level Designer</span>
  </div>
</section>

<!-- PROJECTS -->
<section>
  <h2 data-es="Proyectos" data-en="Projects"></h2>
  <div class="overview-block">
    <p><span class="highlight-word">Bubble Buddies</span> (1st place)</p>
    <p><span class="highlight-word">An Ice Up Your Flipper</span></p>
    <p><span class="highlight-word">Hold Me Tight</span></p>
  </div>
</section>

<!-- CHALLENGES -->
<section>
  <h2 data-es="Desafíos técnicos" data-en="Technical Challenges"></h2>
  <div class="challenge-grid">
    <div class="challenge-card">
      <div class="challenge-card-title"
        data-es="Tiempo limitado"
        data-en="Limited Time">
      </div>
      <div class="challenge-card-desc"
        data-es="Desarrollo completo en pocos días, obligando a priorizar constantemente."
        data-en="Full development in just a few days, forcing constant prioritization.">
      </div>
    </div>

    <div class="challenge-card">
      <div class="challenge-card-title"
        data-es="Restricciones temáticas"
        data-en="Theme Constraints">
      </div>
      <div class="challenge-card-desc"
        data-es="Diseñar mecánicas y narrativa en torno a temas impuestos."
        data-en="Designing mechanics and narrative around given themes.">
      </div>
    </div>
  </div>
</section>

<!-- MEDIA -->
<section>
  <h2 data-es="Media" data-en="Media"></h2>

  <div class="carousel-container">
    <button class="carousel-btn left" onclick="scrollCarousel(-1)">‹</button>

    <div class="carousel" id="carousel">
      <div class="carousel-item">
        <img src="../src/UnityProjects/1.png" onclick="openLightbox(this.src)">
      </div>
      <div class="carousel-item">
        <img src="../src/UnityProjects/2.png" onclick="openLightbox(this.src)">
      </div>
      <div class="carousel-item">
        <img src="../src/UnityProjects/3.png" onclick="openLightbox(this.src)">
      </div>
      <div class="carousel-item">
        <img src="../src/UnityProjects/4.png" onclick="openLightbox(this.src)">
      </div>
      <div class="carousel-item">
        <img src="../src/UnityProjects/4-1.png" onclick="openLightbox(this.src)">
      </div>
      <div class="carousel-item">
        <img src="../src/UnityProjects/5.png" onclick="openLightbox(this.src)">
      </div>
      <div class="carousel-item">
        <img src="../src/UnityProjects/5-2.png" onclick="openLightbox(this.src)">
      </div>
    </div>

    <button class="carousel-btn right" onclick="scrollCarousel(1)">›</button>
  </div>
</section>

<!-- PLAY -->
<section>
  <a href="https://roscarul.itch.io/" target="_blank" class="btn btn-contact btn-itchio">
    <svg viewBox="0 0 24 24" fill="currentColor" class="contact-icon"><path d="M3.13 1.338C2.08 1.96.02 4.328 0 4.95v1.03c0 1.303 1.22 2.45 2.325 2.45 1.33 0 2.436-1.102 2.436-2.41 0 1.308 1.07 2.41 2.4 2.41 1.328 0 2.362-1.102 2.362-2.41 0 1.308 1.107 2.41 2.434 2.41h.024c1.33 0 2.434-1.102 2.434-2.41 0 1.308 1.035 2.41 2.363 2.41 1.33 0 2.4-1.102 2.4-2.41 0 1.308 1.106 2.41 2.435 2.41C22.78 8.43 24 7.283 24 5.98V4.95c-.02-.62-2.082-2.99-3.13-3.612C19.486.47 12.095.442 3.13 1.338zm8.85 6.696c-.332.34-.815.554-1.372.554-.558 0-1.04-.22-1.372-.556v.002c-.334.336-.815.554-1.372.554a2.01 2.01 0 01-.604-.09v8.392c0 .276.526.512 1.173.512h7.938c.646 0 1.172-.236 1.172-.512V8.498a2.014 2.014 0 01-.603.09c-.557 0-1.038-.218-1.37-.554-.334.336-.815.556-1.372.556-.558 0-1.038-.218-1.37-.554l-.002-.002zm-1.788 2.137h4.618c.36 0 .65.294.65.657v3.608c0 .362-.29.657-.65.657H10.19a.653.653 0 01-.65-.657V10.83c0-.363.292-.657.65-.657z"/></svg>
    <span data-es="Ver en itch.io" data-en="View on itch.io"></span>
  </a>
</section>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script src="../script.js"></script>
</body>
</html>
