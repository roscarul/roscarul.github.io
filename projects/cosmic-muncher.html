<!DOCTYPE html>

<body>

<header>
  <h1>Cosmic Muncher</h1>
  <a href="../index.html">← Back</a>

<section>
  <h2 data-es="Descripción" data-en="Overview">Descripción</h2>
  <p 
  data-es="Juego desarrollado en ensamblador Z80 para Game Boy, centrado en optimización y control directo del hardware."
  data-en="Game developed in Z80 Assembly for the Game Boy, focused on optimization and low-level hardware control.">
  </p>
</section>

<section>
  <h2 data-es="Rol" data-en="Role">Rol</h2>
  <p><b>Audio Programmer & Sound Designer</b></p>
</section>

<section>

  <ul>
    <li data-es="Limitaciones de memoria extrema" data-en="Extreme memory constraints"></li>
    <li data-es="Sincronización con VBlank" data-en="VBlank synchronization"></li>
    <li data-es="Programación directa del hardware de audio" data-en="Direct audio hardware programming"></li>
  </ul>
</section>

<section>
  <h2 data-es="Qué aprendí" data-en="What I learned">Qué aprendí</h2>
  <p 
  data-es="Optimización a bajo nivel, control del hardware y eficiencia en sistemas limitados, aprender lenguaje ensamblador."
  data-en="Low-level optimization, hardware control, and efficiency under strict constraints, learn assembly language.">
  </p>
</section>
